experiment:
  name: ghostnetv3_run1
  seed: 42

model:
  name: ghostnetv3
  timm_id: ghostnetv3_100.in1k
  num_classes: 14
  pretrained_weights: models/weights/ghostnetv3.pth

finetune:
  enabled: false
  unfreeze_ratio: 0.0

data:
  processed_dir: data/processed
  input_size: 224
  batch_size: 32
  num_workers: 4

training:
  epochs: 2
  lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 3
  grad_clip: 1.0
  pos_weight: null

output:
  weights_dir: models/weights/ghostnetv3
  logs_dir: results/logs/ghostnetv3
  save_best_metric: val_auc
