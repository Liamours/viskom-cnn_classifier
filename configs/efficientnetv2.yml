experiment:
  name: efficientnetv2_run1
  seed: 42

model:
  name: efficientnetv2
  timm_id: efficientnetv2_rw_t.ra2_in1k
  num_classes: 8
  pretrained_weights: models/weights/efficientnetv2.pth

finetune:
  enabled: true
  unfreeze_ratio: 0.25

data:
  processed_dir: data/processed
  input_size: 224
  batch_size: 32
  num_workers: 4

training:
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 2
  grad_clip: 1.0
  pos_weight: null

output:
  weights_dir: models/weights/efficientnetv2
  logs_dir: results/logs/efficientnetv2
