experiment:
  name: efficientnet_run1
  seed: 42

model:
  name: efficientnet
  timm_id: efficientnet_b0.ra4_e3600_r224_in1k
  num_classes: 14
  pretrained_weights: models/weights/efficientnet.pth

finetune:
  enabled: true
  unfreeze_ratio: 0.25

data:
  processed_dir: data/processed
  input_size: 224
  batch_size: 16
  num_workers: 8

training:
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 2
  grad_clip: 1.0
  pos_weight: null

output:
  weights_dir: models/weights/efficientnet
  logs_dir: results/logs/efficientnet
