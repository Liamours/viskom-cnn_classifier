experiment:
  name: mobilenetv4_run1
  seed: 42

model:
  name: mobilenetv4
  timm_id: mobilenetv4_conv_medium.e500_r224_in1k
  num_classes: 14
  pretrained_weights: models/weights/mobilenetv4.pth

finetune:
  enabled: false
  unfreeze_ratio: 0.0

data:
  processed_dir: data/processed
  input_size: 224
  batch_size: 32
  num_workers: 4

training:
  epochs: 30
  lr: 1.0e-4
  weight_decay: 1.0e-4
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 2
  grad_clip: 1.0
  pos_weight: null

output:
  weights_dir: models/weights/mobilenetv4
  logs_dir: results/logs/mobilenetv4
